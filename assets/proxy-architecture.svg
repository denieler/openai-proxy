<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">OpenAI Proxy Architecture</title>
  <desc id="desc">Architecture diagram showing Codex CLI obtaining a short-lived token from a Deno proxy and forwarding authenticated OpenAI API requests through the proxy.</desc>
  <defs>
    <linearGradient id="bg" x1="84" y1="68" x2="1128" y2="612" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F7F2"/>
      <stop offset="1" stop-color="#E8F2EE"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4F8F6"/>
    </linearGradient>
    <linearGradient id="proxyGlow" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0D7A5F"/>
      <stop offset="1" stop-color="#115B73"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0B3A34" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#255C55"/>
    </marker>
    <marker id="arrowSoft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#72897F"/>
    </marker>
  </defs>

  <rect x="24" y="24" width="1152" height="632" rx="36" fill="url(#bg)"/>
  <circle cx="150" cy="118" r="74" fill="#D9EEE4"/>
  <circle cx="1070" cy="548" r="96" fill="#D6E6F2"/>
  <circle cx="1030" cy="122" r="54" fill="#E6F4EE"/>

  <text x="86" y="110" fill="#153B36" font-family="Helvetica, Arial, sans-serif" font-size="42" font-weight="700">OpenAI Proxy</text>
  <text x="86" y="148" fill="#48615A" font-family="Helvetica, Arial, sans-serif" font-size="20">Short-lived auth, strict header control, generic /v1 forwarding</text>

  <g filter="url(#shadow)">
    <rect x="82" y="226" width="246" height="248" rx="28" fill="url(#panel)"/>
    <rect x="476" y="176" width="270" height="328" rx="34" fill="url(#proxyGlow)"/>
    <rect x="894" y="226" width="224" height="248" rx="28" fill="url(#panel)"/>
  </g>

  <rect x="106" y="252" width="198" height="68" rx="18" fill="#EAF5EF"/>
  <text x="205" y="294" text-anchor="middle" fill="#184740" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">Codex CLI</text>
  <text x="205" y="342" text-anchor="middle" fill="#4A645D" font-family="Helvetica, Arial, sans-serif" font-size="18">Custom model endpoint</text>
  <text x="205" y="372" text-anchor="middle" fill="#4A645D" font-family="Helvetica, Arial, sans-serif" font-size="18">Bearer short-lived token</text>

  <rect x="526" y="214" width="170" height="46" rx="14" fill="#D6F1E7"/>
  <text x="611" y="243" text-anchor="middle" fill="#0E4037" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Deno Service</text>
  <text x="611" y="290" text-anchor="middle" fill="#E7FFFA" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">POST /auth/token</text>
  <text x="611" y="321" text-anchor="middle" fill="#D7F4EE" font-family="Helvetica, Arial, sans-serif" font-size="18">Verify HMAC signature + timestamp</text>

  <rect x="528" y="346" width="186" height="122" rx="20" fill="rgba(255,255,255,0.14)"/>
  <text x="621" y="378" text-anchor="middle" fill="#F4FFFB" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">ALL /v1/*</text>
  <text x="621" y="409" text-anchor="middle" fill="#D7F4EE" font-family="Helvetica, Arial, sans-serif" font-size="18">Validate proxy token</text>
  <text x="621" y="436" text-anchor="middle" fill="#D7F4EE" font-family="Helvetica, Arial, sans-serif" font-size="18">Strip client Authorization</text>
  <text x="621" y="463" text-anchor="middle" fill="#D7F4EE" font-family="Helvetica, Arial, sans-serif" font-size="18">Inject OPENAI_API_KEY</text>

  <rect x="920" y="252" width="172" height="68" rx="18" fill="#EAF1F8"/>
  <text x="1006" y="294" text-anchor="middle" fill="#183B4A" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">OpenAI API</text>
  <text x="1006" y="342" text-anchor="middle" fill="#51666E" font-family="Helvetica, Arial, sans-serif" font-size="18">JSON + SSE streaming</text>
  <text x="1006" y="372" text-anchor="middle" fill="#51666E" font-family="Helvetica, Arial, sans-serif" font-size="18">Hardcoded upstream host</text>

  <path d="M327 290C390 290 422 290 475 290" stroke="#255C55" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M744 290C807 290 838 290 893 290" stroke="#255C55" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M894 408C838 408 808 408 744 408" stroke="#6D8479" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 12" marker-end="url(#arrowSoft)"/>
  <path d="M475 408C422 408 390 408 327 408" stroke="#6D8479" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 12" marker-end="url(#arrowSoft)"/>

  <rect x="206" y="514" width="788" height="86" rx="22" fill="rgba(255,255,255,0.6)" stroke="#D4E3DC"/>
  <text x="600" y="549" text-anchor="middle" fill="#284B46" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">Security Baseline</text>
  <text x="600" y="581" text-anchor="middle" fill="#55706A" font-family="Helvetica, Arial, sans-serif" font-size="18">Short TTL tokens  •  Rate limiting  •  Request size limits  •  Secret rotation  •  Docker + Fly.io deployment</text>

  <rect x="348" y="246" width="92" height="32" rx="16" fill="#F1F6F4"/>
  <text x="394" y="267" text-anchor="middle" fill="#39615A" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700">signed auth</text>
  <rect x="760" y="246" width="128" height="32" rx="16" fill="#F1F6F4"/>
  <text x="824" y="267" text-anchor="middle" fill="#39615A" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700">OpenAI request</text>
  <rect x="763" y="423" width="122" height="32" rx="16" fill="#F1F6F4"/>
  <text x="824" y="444" text-anchor="middle" fill="#39615A" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700">stream relay</text>
  <rect x="350" y="423" width="89" height="32" rx="16" fill="#F1F6F4"/>
  <text x="394" y="444" text-anchor="middle" fill="#39615A" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700">token back</text>
</svg>

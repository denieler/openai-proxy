<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">OpenAI Proxy Architecture</title>
  <desc id="desc">A polished architecture diagram showing Codex CLI obtaining a short-lived token from a Deno proxy and forwarding authenticated OpenAI API requests through the proxy.</desc>
  <defs>
    <linearGradient id="bg" x1="84" y1="56" x2="1128" y2="664" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F6F1"/>
      <stop offset="1" stop-color="#E7F1ED"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F3F8F5"/>
    </linearGradient>
    <linearGradient id="proxy" x1="488" y1="196" x2="760" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D7A5F"/>
      <stop offset="1" stop-color="#124E6A"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F8FBFA"/>
      <stop offset="1" stop-color="#EEF4F1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0E3835" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M0 0L12 6L0 12V0Z" fill="#255C55"/>
    </marker>
    <marker id="arrowSoft" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M0 0L12 6L0 12V0Z" fill="#7A8E85"/>
    </marker>
  </defs>

  <rect x="24" y="24" width="1152" height="672" rx="36" fill="url(#bg)"/>
  <circle cx="118" cy="94" r="66" fill="#DBECE4"/>
  <circle cx="1090" cy="142" r="52" fill="#DDEBE5"/>
  <circle cx="1058" cy="588" r="90" fill="#D9E7F1"/>

  <g filter="url(#shadow)">
    <rect x="78" y="58" width="1044" height="114" rx="30" fill="rgba(255,255,255,0.76)"/>
  </g>
  <text x="96" y="106" fill="#153B36" font-family="Helvetica, Arial, sans-serif" font-size="44" font-weight="700">OpenAI Proxy</text>
  <text x="96" y="144" fill="#4B655F" font-family="Helvetica, Arial, sans-serif" font-size="21">Short-lived auth, strict header rewriting, and OpenAI-compatible /v1 request relay for Codex CLI</text>

  <g filter="url(#shadow)">
    <rect x="84" y="228" width="248" height="274" rx="30" fill="url(#panel)"/>
    <rect x="464" y="194" width="272" height="344" rx="36" fill="url(#proxy)"/>
    <rect x="868" y="228" width="248" height="274" rx="30" fill="url(#panel)"/>
  </g>

  <rect x="110" y="256" width="196" height="70" rx="20" fill="#E9F4EE"/>
  <text x="208" y="300" text-anchor="middle" fill="#184740" font-family="Helvetica, Arial, sans-serif" font-size="29" font-weight="700">Codex CLI</text>
  <text x="208" y="360" text-anchor="middle" fill="#4D6760" font-family="Helvetica, Arial, sans-serif" font-size="18">Calls custom model endpoint</text>
  <text x="208" y="390" text-anchor="middle" fill="#4D6760" font-family="Helvetica, Arial, sans-serif" font-size="18">Uses proxy bearer token</text>
  <text x="208" y="420" text-anchor="middle" fill="#4D6760" font-family="Helvetica, Arial, sans-serif" font-size="18">Receives JSON or SSE stream</text>

  <rect x="518" y="226" width="164" height="44" rx="14" fill="#D7F1E6"/>
  <text x="600" y="254" text-anchor="middle" fill="#0F4037" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Deno Service</text>

  <rect x="504" y="294" width="192" height="90" rx="22" fill="rgba(255,255,255,0.14)"/>
  <text x="600" y="326" text-anchor="middle" fill="#F4FFFB" font-family="Helvetica, Arial, sans-serif" font-size="23" font-weight="700">POST /auth/token</text>
  <text x="600" y="356" text-anchor="middle" fill="#D7F4EE" font-family="Helvetica, Arial, sans-serif" font-size="17">Verify HMAC signature</text>
  <text x="600" y="381" text-anchor="middle" fill="#D7F4EE" font-family="Helvetica, Arial, sans-serif" font-size="17">Check timestamp freshness</text>

  <rect x="504" y="404" width="192" height="104" rx="22" fill="rgba(255,255,255,0.14)"/>
  <text x="600" y="436" text-anchor="middle" fill="#F4FFFB" font-family="Helvetica, Arial, sans-serif" font-size="23" font-weight="700">ALL /v1/*</text>
  <text x="600" y="466" text-anchor="middle" fill="#D7F4EE" font-family="Helvetica, Arial, sans-serif" font-size="17">Validate short-lived token</text>
  <text x="600" y="491" text-anchor="middle" fill="#D7F4EE" font-family="Helvetica, Arial, sans-serif" font-size="17">Strip client Authorization</text>
  <text x="600" y="516" text-anchor="middle" fill="#D7F4EE" font-family="Helvetica, Arial, sans-serif" font-size="17">Inject OPENAI_API_KEY</text>

  <rect x="894" y="256" width="196" height="70" rx="20" fill="#EAF1F8"/>
  <text x="992" y="300" text-anchor="middle" fill="#183B4A" font-family="Helvetica, Arial, sans-serif" font-size="29" font-weight="700">OpenAI API</text>
  <text x="992" y="360" text-anchor="middle" fill="#53676E" font-family="Helvetica, Arial, sans-serif" font-size="18">Receives rewritten auth</text>
  <text x="992" y="390" text-anchor="middle" fill="#53676E" font-family="Helvetica, Arial, sans-serif" font-size="18">Returns JSON and SSE streams</text>
  <text x="992" y="420" text-anchor="middle" fill="#53676E" font-family="Helvetica, Arial, sans-serif" font-size="18">Hardcoded upstream hostname</text>

  <path d="M332 336C390 336 418 336 462 336" stroke="#255C55" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M738 336C784 336 812 336 866 336" stroke="#255C55" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M866 430C810 430 784 430 738 430" stroke="#7A8E85" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 12" marker-end="url(#arrowSoft)"/>
  <path d="M462 430C418 430 390 430 332 430" stroke="#7A8E85" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 12" marker-end="url(#arrowSoft)"/>

  <rect x="354" y="288" width="86" height="30" rx="15" fill="url(#chip)"/>
  <text x="397" y="308" text-anchor="middle" fill="#3D625C" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700">signed auth</text>

  <rect x="762" y="288" width="114" height="30" rx="15" fill="url(#chip)"/>
  <text x="819" y="308" text-anchor="middle" fill="#3D625C" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700">OpenAI request</text>

  <rect x="764" y="446" width="108" height="30" rx="15" fill="url(#chip)"/>
  <text x="818" y="466" text-anchor="middle" fill="#3D625C" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700">stream relay</text>

  <rect x="362" y="446" width="78" height="30" rx="15" fill="url(#chip)"/>
  <text x="401" y="466" text-anchor="middle" fill="#3D625C" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700">token back</text>

  <g filter="url(#shadow)">
    <rect x="184" y="566" width="832" height="92" rx="24" fill="rgba(255,255,255,0.68)"/>
  </g>
  <text x="600" y="605" text-anchor="middle" fill="#284B46" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">Security Baseline</text>
  <text x="600" y="636" text-anchor="middle" fill="#58716A" font-family="Helvetica, Arial, sans-serif" font-size="18">Short TTL tokens  •  Rate limiting  •  Request size limits  •  Secret rotation  •  Docker and Fly.io deployment</text>
</svg>

<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Abstract OpenAI Proxy Illustration</title>
  <desc id="desc">Abstract illustration with flowing request paths, token-like shapes, and a protected gateway motif representing an authenticated proxy between a client and the OpenAI API.</desc>
  <defs>
    <linearGradient id="bg" x1="108" y1="58" x2="1096" y2="664" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F5EE"/>
      <stop offset="0.52" stop-color="#EEF4F0"/>
      <stop offset="1" stop-color="#E4EEF4"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(286 290) rotate(25) scale(326 254)">
      <stop stop-color="#D5ECE2"/>
      <stop offset="1" stop-color="#D5ECE2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(966 414) rotate(-18) scale(308 246)">
      <stop stop-color="#D9E7F1"/>
      <stop offset="1" stop-color="#D9E7F1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="frame" x1="116" y1="124" x2="1082" y2="598" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.82"/>
      <stop offset="1" stop-color="white" stop-opacity="0.56"/>
    </linearGradient>
    <linearGradient id="gateway" x1="470" y1="180" x2="730" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E7A60"/>
      <stop offset="1" stop-color="#154E68"/>
    </linearGradient>
    <linearGradient id="flowHot" x1="156" y1="282" x2="1048" y2="282" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7BC5AC"/>
      <stop offset="0.48" stop-color="#0E7A60"/>
      <stop offset="1" stop-color="#5EA7C5"/>
    </linearGradient>
    <linearGradient id="flowCool" x1="1040" y1="446" x2="154" y2="446" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9AB9D8"/>
      <stop offset="0.46" stop-color="#5C8FA1"/>
      <stop offset="1" stop-color="#A7B9AE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#143833" flood-opacity="0.11"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#183630" flood-opacity="0.08"/>
    </filter>
  </defs>


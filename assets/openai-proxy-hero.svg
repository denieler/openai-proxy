<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">OpenAI Proxy Hero Illustration</title>
  <desc id="desc">Abstract hero illustration for an authenticated OpenAI proxy, using flowing paths, token shapes, and a central secure gateway.</desc>
  <defs>
    <linearGradient id="bg" x1="86" y1="34" x2="1170" y2="676" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F3EA"/>
      <stop offset="0.5" stop-color="#EDF4EF"/>
      <stop offset="1" stop-color="#E5EEF5"/>
    </linearGradient>
    <radialGradient id="leftGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(302 292) rotate(24) scale(380 276)">
      <stop stop-color="#D7ECE3"/>
      <stop offset="1" stop-color="#D7ECE3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rightGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1012 420) rotate(-18) scale(360 268)">
      <stop stop-color="#D8E7F2"/>
      <stop offset="1" stop-color="#D8E7F2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="104" y1="90" x2="1168" y2="628" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.78"/>
      <stop offset="1" stop-color="white" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="gateway" x1="510" y1="150" x2="786" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B7A60"/>
      <stop offset="1" stop-color="#154B68"/>
    </linearGradient>
    <linearGradient id="beamWarm" x1="150" y1="286" x2="1130" y2="286" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9ED8BF"/>
      <stop offset="0.44" stop-color="#0B7A60"/>
      <stop offset="1" stop-color="#72B1CF"/>
    </linearGradient>
    <linearGradient id="beamCool" x1="1130" y1="446" x2="150" y2="446" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A9C1DD"/>
      <stop offset="0.48" stop-color="#5A91A4"/>
      <stop offset="1" stop-color="#B7C8BC"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="white"/>
      <stop offset="1" stop-color="#EEF5F1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#173832" flood-opacity="0.12"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#16342E" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect x="24" y="24" width="1232" height="672" rx="38" fill="url(#bg)"/>
  <ellipse cx="310" cy="292" rx="300" ry="220" fill="url(#leftGlow)"/>
  <ellipse cx="998" cy="420" rx="302" ry="228" fill="url(#rightGlow)"/>


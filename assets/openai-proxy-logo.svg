<svg width="760" height="220" viewBox="0 0 760 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">OpenAI Proxy logo</title>
  <desc id="desc">A custom logo for the OpenAI Proxy project featuring a secure gateway icon and wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="40" y1="28" x2="696" y2="212" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#132238"/>
    </linearGradient>
    <linearGradient id="accent" x1="122" y1="54" x2="188" y2="165" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6EE7B7"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="glow" x1="115" y1="68" x2="190" y2="151" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="softGlow" x="78" y="35" width="152" height="152" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feGaussianBlur stdDeviation="10" result="effect1_foregroundBlur"/>
    </filter>
  </defs>

  <rect x="10" y="10" width="740" height="200" rx="28" fill="url(#bg)"/>
  <rect x="10.75" y="10.75" width="738.5" height="198.5" rx="27.25" stroke="#334155" stroke-opacity="0.55" stroke-width="1.5"/>

  <path d="M52 58H708" stroke="#1E293B" stroke-width="1.5" stroke-dasharray="4 8"/>
  <path d="M52 162H708" stroke="#1E293B" stroke-width="1.5" stroke-dasharray="4 8"/>

  <g filter="url(#softGlow)">
    <circle cx="154" cy="110" r="48" fill="url(#glow)"/>
  </g>

  <rect x="92" y="48" width="124" height="124" rx="30" fill="#09111D"/>
  <rect x="92.75" y="48.75" width="122.5" height="122.5" rx="29.25" stroke="#1E293B" stroke-width="1.5"/>

  <path d="M118 110H144" stroke="#94A3B8" stroke-width="8" stroke-linecap="round"/>
  <path d="M194 110H168" stroke="#94A3B8" stroke-width="8" stroke-linecap="round"/>
  <path d="M135 97L118 110L135 123" stroke="#94A3B8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M177 97L194 110L177 123" stroke="#94A3B8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M154 73L177 83V104C177 120 167 134 154 141C141 134 131 120 131 104V83L154 73Z" fill="url(#accent)"/>
  <path d="M145 104L151 110L163 96" stroke="#072032" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="262" y="98" fill="#F8FAFC" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="700" letter-spacing="-1.2">
    OpenAI Proxy
  </text>
  <text x="262" y="137" fill="#93C5FD" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="500" letter-spacing="1.8">
    SECURE DENO GATEWAY
  </text>
  <path d="M262 154H520" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
</svg>
